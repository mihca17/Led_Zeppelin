<!DOCTYPE html>
<html lang="ru">
  <head>
      <title>TITLE</title>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
        <div id="Buttons">
            <button class="btn" id="temp"></button>
            <button class="btn" id="water"></button>
            <button class="btn" id="rad"></button>
        </div>

        <div id="Charts">
          <div style="height:200px; width:600px">
            <canvas id="myChart"></canvas>
          </div>

          <div style="height:200px; width:600px">
            <canvas id="temperatureChart" ></canvas>
          </div>

          <div style="height:200px; width:600px">
            <canvas id="waterChart"></canvas>
          </div>
        </div>
  

      <canvas id="radiationChart"></canvas>
      <h1>aaa</h1>
  </body>
<script>
    let chart
    let temperatureChart
    let waterChart
    let radiationChart 



    async function updateChart(){
      const response = await fetch('/api/data/');
      const data = await response.json();

      if (chart){
        chart.data.labels = data.labels;
        chart.data.datasets[0].data = data.values;
        chart.update()
      }
      else{
          const context = document.getElementById('myChart').getContext('2d');
          chart = new Chart( context, {
            type: 'line',
            data: {
              labels: data.labels,
              datasets: [{
                label: 'LABEL',
                data: data.values,
                backgroundColor: 'blue'
              }]
            }
          });
      }
    }

    async function updateChart2(){
      const response = await fetch('/api/data/');
      const data = await response.json();

      if (temperatureChart){

              datasets: [{
                label: 'LABEL',

                backgroundColor: 'blue'
              }]
            }
          });
      }
    }

    async function updateChart3(){
      const response = await fetch('/api/data/');
      const data = await response.json();

      if (waterChart){
        waterChart.data.labels = data.labels;
        waterChart.data.datasets[0].data = data.values;
        waterChart.update()
      }
      else{
          const context = document.getElementById('waterChart').getContext('2d');

              labels: data.labels,
              datasets: [{
                label: 'LABEL',
                data: data.values,
                backgroundColor: 'blue'
              }]
            }
          });
      }
    }

    setInterval(updateChart, 1000);
    setInterval(updateChart2, 1000);
    setInterval(updateChart3, 1000);
    updateChart3()
    updateChart2()
    updateChart()
</script>
</html>
