<!DOCTYPE html>
<html lang="ru">
  <head>
      <title>TITLE</title>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body style="display: flex; flex-direction:column">
  <div style="display: flex; height:100px">

  </div>
  <div style="display: flex; gap:50px">
        <div class="text-bg-light p-3" id="Buttons" style="display:flex; flex-direction:column; width:300px; gap:30px; border:1px solid #ccc; border-radius: 10px">
            <form method="post" style="display:flex; flex-direction:column; gap:15px; margin: 10px">
                {% csrf_token %}
                <button type = "submit" class="btn btn-warning" id="reset" name="reset">Перезапуск реактора</button>
                <button type = "submit" class="btn btn-primary" id="cooling" name="cooling">Охлаждение</button>
                <button type = "submit" class="btn btn-primary" id="refill" name="refill">Долить воду</button>
                <input type = "number" name="number" placeholder="Введите количество воды">
            </form>
            <form method="post" style="display:flex; flex-direction:column; gap:15px; margin: 10px">
                {% csrf_token %}
                <button type = "submit" class="btn btn-danger" id="shutdown" name="shutdown" style="margin-top:0">Аварийная остановка</button>
            </form>
        </div>

        <div id="Charts" style="border:1px solid #ccc; border-radius: 10px">

          <div style="height:300px; width:800px">
            <canvas id="temperatureChart" style="height:600px; width:1600px"></canvas>
          </div>

          <div style="height:200px; width:800px">
            <canvas id="waterChart" style="height:400px; width:1600px"></canvas>
          </div>

            <div style="height:200px; width:800px">
                <canvas id="radiationChart" style="height:400px; width:1600px"></canvas>
            </div>

        </div>
      <div id="History" style="display:flex; flex-direction: column; align-items:center; border:1px solid #ccc; border-radius: 10px; width: 500px">
          <div style="display: flex; flex-direction: column; align-items:center">
              <a>История изменений:</a>

          </div>



        </div>
  </div>



  </body>
<script>
<!--говнокод (все в одном файле):    -->

    let chart
    let temperatureChart
    let waterChart
    let radiationChart

    async function updateChart(){
      const response = await fetch('/api/data/');
      const data = await response.json();

      if (chart){
        chart.data.labels = data.labels;
        chart.data.datasets[0].data = data.values;
        chart.update()
      }
      else{
          const context = document.getElementById('temperatureChart').getContext('2d');
          chart = new Chart( context, {
            type: 'line',
            data: {
              labels: data.labels,
              datasets: [{
                label: 'Температура',
                data: data.values,
                backgroundColor: 'red'
              }]
            }
          });
      }
    }

    async function updateChart2(){
      const response = await fetch('/api/data2/');
      const data = await response.json();

      if (temperatureChart){
        temperatureChart.data.labels = data.labels;
        temperatureChart.data.datasets[0].data = data.values;
        temperatureChart.update()
      }
      else{
          const context = document.getElementById('waterChart').getContext('2d');
          temperatureChart = new Chart( context, {
            type: 'line',
            data: {
              labels: data.labels,
              datasets: [{
                label: 'Уровень воды',
                data: data.values,
                backgroundColor: 'blue'
              }]
            }
          });
      }
    }

    async function updateChart3(){
      const response = await fetch('/api/data3/');
      const data = await response.json();

      if (waterChart){
        waterChart.data.labels = data.labels;
        waterChart.data.datasets[0].data = data.values;
        waterChart.update()
      }
      else{
          const context = document.getElementById('radiationChart').getContext('2d');
          waterChart = new Chart( context, {
            type: 'line',
            data: {
              labels: data.labels,
              datasets: [{
                label: 'Радиация',
                data: data.values,
                backgroundColor: 'green'
              }]
            }
          });
      }
    }

    setInterval(updateChart, 1000);
    setInterval(updateChart2, 1000);
    setInterval(updateChart3, 1000);
    updateChart3()
    updateChart2()
    updateChart()
</script>
</html>
